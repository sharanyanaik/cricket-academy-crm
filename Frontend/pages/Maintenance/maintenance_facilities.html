<!DOCTYPE html>
<html lang="en">
<head>
  <title>Facilities | Cricket CRM</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/maintenance.css">
  <style>
    .badge.good { background: #d1fae5; color: #065f46; padding: 5px 12px; border-radius: 20px; }
    .badge.warn { background: #fed7aa; color: #92400e; padding: 5px 12px; border-radius: 20px; }
    .badge.critical { background: #fee2e2; color: #991b1b; padding: 5px 12px; border-radius: 20px; }
    .btn-small { background: #e2e8f0; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
    .add-btn { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <h2>Cricket CRM</h2>
    <p class="role">Maintenance Panel</p>
    <a href="maintenance_dashboard.html"><i class="fa-solid fa-tools"></i> Dashboard</a>
    <a href="maintenance_facilities.html" class="active"><i class="fa-solid fa-building"></i> Facilities</a>
    <a href="maintenance_issues.html"><i class="fa-solid fa-exclamation-triangle"></i> Issues</a>
    <a href="maintenance_schedule.html"><i class="fa-solid fa-calendar"></i> Schedule</a>
    <a href="maintenance_cost.html"><i class="fa-solid fa-chart-line"></i> Cost Tracking</a>
    <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>

  <div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
      <h2><i class="fa-solid fa-building"></i> Facilities</h2>
      <button class="add-btn" onclick="openAddFacilityModal()"><i class="fa-solid fa-plus"></i> Add Facility</button>
    </div>

    <div class="card">
      <table class="table">
        <thead>
    <tr>
        <th>Facility</th>
        <th>Type</th>
        <th>Status</th>
        <th>Last Maint.</th>
        <th>Next Maint.</th>
        <th>Action</th>
    </tr>
</thead>
        <tbody id="facilitiesBody">
          <tr><td colspan="5" class="text-center">Loading...</td</tr
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../js/maintenance/maintenance_common.js"></script>
<script src="../../js/maintenance/maintenance_facilities.js"></script>
</body>
</html>
