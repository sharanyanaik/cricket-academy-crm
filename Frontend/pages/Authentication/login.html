<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CrickTrack CRM | Login</title>

<link rel="stylesheet" href="../../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    .error-msg {
        background: #fee2e2;
        color: #991b1b;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: none;
        font-size: 14px;
        text-align: left;
    }
    .success-msg {
        background: #d1fae5;
        color: #065f46;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: none;
        font-size: 14px;
        text-align: left;
    }
    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
<div class="logo">
  <img src="../../images/logo1.jpg">
  <h1 class="logo">CrickTrack <span>CRM</span></h1>
</div>
<div class="nav-right">
<div class="contact">
  <span class="email"><i class="fa fa-envelope"></i> info@cricktrack.com</span>
  <span class="phone"><i class="fa fa-phone"></i> +91 6587567501</span>
</div>
<nav>
  <a href="../../index.html">Home</a>
  <a href="../../about.html">About</a>
  <a href="../../contact.html">Contact</a>
</nav>
</div>
</header>

<!-- LOGIN SECTION -->
<section class="login-section">
<div class="login-card">
<h2><i class="fa fa-sign-in-alt"></i> Welcome Back!</h2>
<p>Please login to your account</p>

<div id="errorMsg" class="error-msg"></div>
<div id="successMsg" class="success-msg"></div>

<form id="loginForm" onsubmit="return false;">
<input type="email" id="email" placeholder="Enter email" required>
<input type="password" id="password" placeholder="Enter the password" required>
<div class="forgot">
<a href="forgot_pass.html">Forgot password?</a>
</div>
<button type="button" id="loginBtn" onclick="handleLogin()">Login</button>
<div class="register">
<p style="color: black;">Don't have an account?</p>
<a href="register.html">Register here</a>
</div>
</form>
</div>
</section>

<footer>© 2026 CrickTrack CRM</footer>

<!-- JavaScript Files -->
<script src="../../js/auth/auth.js"></script>
<script src="../../js/auth/login.js"></script>

</body>
</html>
