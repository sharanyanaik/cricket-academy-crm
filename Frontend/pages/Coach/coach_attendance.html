<!DOCTYPE html>
<html lang="en">
<head>
  <title>Mark Attendance | Cricket CRM</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .date-badge { background: #e2e8f0; padding: 8px 16px; border-radius: 20px; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
    .batch-selector { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
    .batch-dropdown, .date-picker { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 200px; }
    .attendance-card { background: white; border-radius: 16px; padding: 20px; }
    .attendance-table { width: 100%; border-collapse: collapse; }
    .attendance-table th, .attendance-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .badge.present { background: #d1fae5; color: #065f46; padding: 5px 12px; border-radius: 20px; }
    .badge.absent { background: #fee2e2; color: #991b1b; padding: 5px 12px; border-radius: 20px; }
    .badge.late { background: #fed7aa; color: #92400e; padding: 5px 12px; border-radius: 20px; }
    .btn-present, .btn-absent, .btn-late { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; margin: 0 3px; transition: all 0.2s; }
    .btn-present { background: #10b981; color: white; }
    .btn-present:hover { background: #059669; }
    .btn-absent { background: #ef4444; color: white; }
    .btn-absent:hover { background: #dc2626; }
    .btn-late { background: #f59e0b; color: white; }
    .btn-late:hover { background: #d97706; }
    .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
    .btn-load { background: #2563eb; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
    .btn-load:hover { background: #1d4ed8; }
  </style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <h2>Cricket CRM</h2>
    <p class="role">Coach Panel</p>
    <a href="coach_dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="coach_players.html"><i class="fa-solid fa-users"></i> My Players</a>
    <a href="coach_attendance.html" class="active"><i class="fa-solid fa-calendar-check"></i> Attendance</a>
    <a href="coach_performance.html"><i class="fa-solid fa-chart-simple"></i> Performance</a>
    <a href="coach_notes.html"><i class="fa-solid fa-pen"></i> Notes</a>
    <a href="coach_profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a href="coach_schedule.html"><i class="fa-solid fa-calendar-day"></i> Schedule</a>
    <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>

  <div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
      <h2><i class="fa-solid fa-calendar-check"></i> Mark Attendance</h2>
    </div>

    <div class="batch-selector">
      <div class="filter-group">
        <div>
          <label><strong>Select Batch:</strong></label><br>
          <select class="batch-dropdown" id="batchSelect">
            <option value="">-- Select Batch --</option>
          </select>
        </div>
        <div>
          <label><strong>Select Date:</strong></label><br>
          <input type="date" id="attendanceDate" class="date-picker">
        </div>
        <div>
          <button class="btn-load" onclick="loadAttendance()"><i class="fa-solid fa-calendar"></i> Load Attendance</button>
          <button class="btn-load" style="background: #10b981;" onclick="loadTodayAttendance()"><i class="fa-solid fa-calendar-day"></i> Today</button>
        </div>
      </div>
    </div>

    <div class="attendance-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5><i class="fa-solid fa-users"></i> Players List</h5>
        <span class="date-badge"><i class="fa-regular fa-calendar"></i> <span id="selectedDate"></span></span>
      </div>
      <div class="table-responsive">
        <table class="attendance-table">
          <thead>
            <tr><th>Player Name</th><th>Role</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="attendanceTableBody">
            <tr><td colspan="4" class="text-center">Select a batch and date to view players...<\/td><\/tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../../js/coach/coach_common.js"></script>
<script src="../../js/coach/coach_attendance.js"></script>
</body>
</html>
