<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | Cricket CRM - Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .form-card.show {
            display: block;
        }
        .form-card h3 {
            margin-bottom: 20px;
            font-weight: 600;
            border-left: 4px solid #2563eb;
            padding-left: 15px;
        }
        .form-label {
            font-weight: 500;
            margin-bottom: 5px;
            display: block;
            color: #1e293b;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2563eb;
            outline: none;
        }
        .btn-save {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-save:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
        }
        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-add {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
        }
        .btn-cancel {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
        }
        .btn-cancel:hover {
            background: #5a6268;
        }
        .badge-paid {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .badge-pending {
            background: #fed7aa;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .refresh-btn {
            cursor: pointer;
            transition: transform 0.3s;
            color: #2563eb;
        }
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Cricket <span>CRM</span></h2>
            <p class="role">Billing Panel</p>
        </div>
        <div class="sidebar-menu">
            <a href="billing_dashboard.html"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a>
            <a href="bill_invoices.html"><i class="fa-solid fa-file-invoice"></i><span>Invoices</span></a>
            <a href="bill_payments.html" class="active"><i class="fa-solid fa-credit-card"></i><span>Payments</span></a>
            <a href="bill_outstanding.html"><i class="fa-solid fa-clock"></i><span>Outstanding</span></a>
            <a href="bill_fee_billing.html"><i class="fa-solid fa-indian-rupee-sign"></i><span>Fee Billing</span></a>
            <a href="bill_discounts.html"><i class="fa-solid fa-tag"></i><span>Discounts</span></a>
            <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <h2><i class="fa-solid fa-credit-card"></i> Payments</h2>
        </div>

        <!-- New Payment Button -->
        <div class="header-actions">
            <button class="btn-add" id="showAddFormBtn">
                <i class="fa-solid fa-plus"></i> New Payment
            </button>
        </div>

        <!-- Payment Form (Hidden by default) -->
        <div class="form-card" id="paymentFormCard">
            <h3><i class="fa-solid fa-plus-circle"></i> Record New Payment</h3>
            
            <form id="paymentForm">
                <div class="row">
                    <div>
                        <label class="form-label">Select Player *</label>
                        <select id="playerId" class="form-select" required>
                            <option value="">-- Select Player --</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Amount *</label>
                        <input type="number" id="amount" class="form-control" placeholder="Enter amount" required>
                    </div>
                    <div>
                        <label class="form-label">Payment Date *</label>
                        <input type="date" id="paymentDate" class="form-control" required>
                    </div>
                    <div>
                        <label class="form-label">Payment Mode</label>
                        <select id="paymentMode" class="form-select">
                            <option value="cash">Cash</option>
                            <option value="upi">UPI</option>
                            <option value="card">Card</option>
                            <option value="bank_transfer">Bank Transfer</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Transaction ID (Optional)</label>
                        <input type="text" id="transactionId" class="form-control" placeholder="Enter UPI/Card ref">
                    </div>
                    <div>
                        <label class="form-label">Status</label>
                        <select id="status" class="form-select">
                            <option value="completed">Completed</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="form-label">Remarks</label>
                    <textarea id="remarks" class="form-control" rows="2" placeholder="Additional notes"></textarea>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-save mt-3" id="saveBtn">
                        <i class="fa-solid fa-save"></i> Save Payment
                    </button>
                    <button type="button" class="btn-cancel mt-3" id="cancelFormBtn">
                        <i class="fa-solid fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Recent Payments Table -->
        <div class="table-card" id="paymentsContainer">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5><i class="fa-solid fa-clock-rotate-left"></i> Recent Payments</h5>
                <i class="fa-solid fa-arrows-rotate refresh-btn" onclick="refreshPayments()"></i>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Player</th>
                            <th>Amount</th>
                            <th>Mode</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTableBody">
                        <tr><td colspan="5" class="text-center">Loading...</td</tr
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../../js/billing/billing_common.js"></script>
<script src="../../js/billing/bill_payments.js"></script>
</body>
</html>
