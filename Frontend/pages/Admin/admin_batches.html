<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Batch Management | Cricket CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../css/admin.css">
    <style>
        /* Only modal-specific styles - rest comes from admin.css */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 550px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
        .close-btn {
            cursor: pointer;
            font-size: 24px;
            color: #666;
        }
        .close-btn:hover {
            color: red;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2563eb;
        }
        .btn-save {
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            margin-top: 10px;
        }
        .btn-save:hover {
            background: #1d4ed8;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        /* Header actions alignment */
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #searchInput {
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            width: 250px;
            transition: all 0.2s ease;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="sidebar">
        <h2>Cricket CRM</h2>
        <div class="brand-sub">Admin Panel</div>
        <a href="admin_dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="admin_users.html"><i class="fa-solid fa-users"></i> Users</a>
        <a href="admin_player.html"><i class="fa-solid fa-person-running"></i> Players</a>
        <a href="admin_coaches.html"><i class="fa-solid fa-user-tie"></i> Coaches</a>
        <a href="admin_batches.html" class="active"><i class="fa-solid fa-layer-group"></i> Batches</a>
        <a href="admin_fee_structure.html"><i class="fa-solid fa-indian-rupee-sign"></i> Fee Structure</a>
        <a href="admin_payment.html"><i class="fa-solid fa-credit-card"></i> Payments</a>
        <a href="admin_reports.html"><i class="fa-solid fa-file-pdf"></i> Reports</a>
        <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h2><i class="fa-solid fa-layer-group"></i> Batch Management</h2>
            <div class="header-actions">
                <input type="text" id="searchInput" placeholder="Search batch...">
                <button class="add-btn" onclick="showAddBatchModal()">
                    <i class="fa-solid fa-plus"></i> Add New Batch
                </button>
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Batch Name</th>
                            <th>Timing</th>
                            <th>Coach</th>
                            <th>Max Players</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="batchesTableBody">
                        <tr><td colspan="7" class="text-center">Loading...</td\( ">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Batch Modal -->
<div id="batchModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Batch</h3>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
        <form id="batchForm">
            <input type="hidden" id="batchId">
            
            <div class="form-group">
                <label>Select Existing Batch (Optional)</label>
                <select id="select_batch" class="form-control">
                    <option value="">-- Select a batch to edit --</option>
                </select>
                <div class="help-text">Or create a new batch below</div>
            </div>
            
            <hr>
            
            <div class="form-group">
                <label>Batch Name *</label>
                <input type="text" id="batch_name" placeholder="Enter batch name" required>
            </div>
            
            <div class="form-group">
                <label>Timing *</label>
                <input type="text" id="timing" placeholder="e.g., 6:00 AM - 8:00 AM" required>
            </div>
            
            <div class="form-group">
                <label>Assign Coach</label>
                <select id="coach_id">
                    <option value="">-- Select Coach --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Max Players</label>
                <input type="number" id="max_players" value="20">
            </div>
            
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            
            <button type="submit" class="btn-save">Save Batch</button>
        </form>
    </div>
</div>

<script src="../../js/admin/admin_common.js"></script>
<script src="../../js/admin/admin_batches.js"></script>
</body>
</html>
