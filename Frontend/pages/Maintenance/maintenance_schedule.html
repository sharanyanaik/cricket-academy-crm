<!DOCTYPE html>
<html lang="en">
<head>
  <title>Schedule | Cricket CRM</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/maintenance.css">
  <style>
    .pending { background: #fed7aa; color: #92400e; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .progress { background: #fed7aa; color: #92400e; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .done { background: #d1fae5; color: #065f46; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .btn-primary { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    .btn-primary:hover { background: #1d4ed8; }
    
    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: white;
        border-radius: 12px;
        width: 500px;
        max-width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        animation: slideIn 0.3s ease;
    }
    .modal-header {
        padding: 20px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .modal-header h3 {
        margin: 0;
        color: #1e293b;
    }
    .modal-header .close-btn {
        cursor: pointer;
        font-size: 24px;
        color: #94a3b8;
    }
    .modal-header .close-btn:hover {
        color: #ef4444;
    }
    .modal-body {
        padding: 20px;
    }
    .modal-footer {
        padding: 20px;
        border-top: 1px solid #e2e8f0;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        color: #334155;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 14px;
    }
    .btn-save {
        background: #10b981;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
    }
    .btn-save:hover {
        background: #059669;
    }
    .btn-cancel {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
    }
    .btn-cancel:hover {
        background: #dc2626;
    }
    .add-btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 20px;
    }
    .add-btn:hover {
        background: #1d4ed8;
    }
    @keyframes slideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
  </style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <h2>Cricket CRM</h2>
    <p class="role">Maintenance Panel</p>
    <a href="maintenance_dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="maintenance_facilities.html"><i class="fa-solid fa-building"></i> Facilities</a>
    <a href="maintenance_issues.html"><i class="fa-solid fa-exclamation-triangle"></i> Issues</a>
    <a href="maintenance_schedule.html" class="active"><i class="fa-solid fa-calendar"></i> Schedule</a>
    <a href="maintenance_cost.html"><i class="fa-solid fa-chart-line"></i> Cost Tracking</a>
    <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>

  <div class="main-content">
    <div class="page-header">
      <h2><i class="fa-solid fa-calendar"></i> Maintenance Schedule</h2>
    </div>

    <!-- Add Schedule Button -->
    <button class="add-btn" onclick="showAddScheduleModal()">
      <i class="fa-solid fa-plus"></i> Add Schedule
    </button>

    <!-- Schedule Table -->
    <div class="card">
      <h3>Upcoming Maintenance</h3>
      <table class="table">
        <thead>
          <tr>
            <th>Facility</th>
            <th>Task</th>
            <th>Date</th>
            <th>Assigned To</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="scheduleBody">
          <tr><td colspan="5" class="text-center">Loading...</td</tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Schedule Modal -->
<div id="scheduleModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fa-solid fa-plus-circle"></i> Add Maintenance Schedule</h3>
      <span class="close-btn" onclick="closeModal()">&times;</span>
    </div>
    <form id="scheduleForm" onsubmit="event.preventDefault(); saveSchedule();">
      <div class="modal-body">
        <div class="form-group">
          <label><i class="fa-solid fa-building"></i> Facility *</label>
          <select id="facilitySelect" class="form-control" required>
            <option value="">Select Facility</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-tasks"></i> Task Description *</label>
          <input type="text" id="taskInput" class="form-control" placeholder="Example: Net repair" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-calendar"></i> Scheduled Date *</label>
          <input type="date" id="dateInput" class="form-control" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-user"></i> Assigned To</label>
          <select id="assignedSelect" class="form-control">
            <!-- Options populated by JavaScript -->
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save Schedule</button>
      </div>
    </form>
  </div>
</div>

<script src="../../js/maintenance/maintenance_common.js"></script>
<script src="../../js/maintenance/maintenance_schedule.js"></script>
</body>
</html>
