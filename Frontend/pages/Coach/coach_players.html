<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Players | Cricket CRM</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .badge-primary { background: #3b82f6; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .badge-success { background: #10b981; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .badge-warning { background: #f59e0b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .badge-info { background: #06b6d4; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .badge-secondary { background: #64748b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .view-btn { background: none; border: none; color: #2563eb; cursor: pointer; padding: 5px 10px; border-radius: 6px; }
    .view-btn:hover { background: #eff6ff; }
    .filter-section {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .filter-section input, .filter-section select {
        padding: 8px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        min-width: 200px;
    }
    .filter-section input:focus, .filter-section select:focus {
        outline: none;
        border-color: #2563eb;
    }
  </style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <h2>Cricket CRM</h2>
    <p class="role">Coach Panel</p>
    <a href="coach_dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="coach_players.html" class="active"><i class="fa-solid fa-users"></i> My Players</a>
    <a href="coach_attendance.html"><i class="fa-solid fa-calendar-check"></i> Attendance</a>
    <a href="coach_performance.html"><i class="fa-solid fa-chart-simple"></i> Performance</a>
    <a href="coach_notes.html"><i class="fa-solid fa-pen"></i> Notes</a>
    <a href="coach_profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <a href="coach_schedule.html"><i class="fa-solid fa-calendar-day"></i> Schedule</a>
    <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>

  <div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
      <h2><i class="fa-solid fa-users"></i> My Players</h2>
    </div>

    <div class="table-card">      
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Name</th>
              <th>Age</th>
              <th>Role</th>
              <th>Batch</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="playersTableBody">
            <tr><td colspan="5" class="text-center">Loading players...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../../js/coach/coach_common.js"></script>
<script src="../../js/coach/coach_players.js"></script>
</body>
</html>
